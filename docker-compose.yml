services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - Jwt__Key=${JWT_KEY}
      - OpenSky__ClientId=${OPENSKY_CLIENT_ID}
      - OpenSky__ClientSecret=${OPENSKY_CLIENT_SECRET}
    volumes:
      - sqlite-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite-data:
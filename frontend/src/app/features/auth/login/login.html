<div class="min-h-screen bg-sky-100 dark:bg-slate-900 flex items-center justify-center px-4 transition-colors">
  <div class="bg-white dark:bg-slate-800 p-8 rounded-2xl w-full max-w-md shadow-xl border border-sky-200 dark:border-slate-700">
    <div class="mb-8 text-center">
      <h1 class="text-sky-600 dark:text-sky-400 text-3xl font-bold tracking-wide">✈ AviTrack</h1>
      <p class="text-sky-400 dark:text-sky-500 text-sm mt-1">Twój panel śledzenia lotów</p>
    </div>
    <form (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label class="text-sky-700 dark:text-sky-300 text-sm block mb-1">Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          autocomplete="email"
          [disabled]="loading"
          class="w-full bg-sky-50 dark:bg-slate-700 text-sky-900 dark:text-slate-100 border border-sky-300 dark:border-slate-600 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sky-400 dark:focus:ring-sky-500 disabled:opacity-60"
        />
      </div>
      <div class="mb-6">
        <label class="text-sky-700 dark:text-sky-300 text-sm block mb-1">Hasło</label>
        <div class="relative">
          <input
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            autocomplete="current-password"
            [disabled]="loading"
            class="w-full bg-sky-50 dark:bg-slate-700 text-sky-900 dark:text-slate-100 border border-sky-300 dark:border-slate-600 rounded-lg px-3 py-2 pr-10 focus:outline-none focus:ring-2 focus:ring-sky-400 dark:focus:ring-sky-500 disabled:opacity-60"
          />
          <button
            type="button"
            (click)="togglePasswordVisibility()"
            [disabled]="loading"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-sky-600 dark:text-sky-400 hover:text-sky-700 dark:hover:text-sky-300 disabled:opacity-60 transition-colors"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
          >
            @if (showPassword) {
              <img class="w-5" src="assets/eye-off.svg" alt="Oko zamknięte" />
            } @else {
              <img class="w-5" src="assets/eye.svg" alt="Oko otwarte" />
            }
          </button>
        </div>
      </div>
      <button
        type="submit"
        [disabled]="loading"
        class="w-full bg-sky-500 hover:bg-sky-600 dark:bg-sky-600 dark:hover:bg-sky-700 disabled:bg-sky-300 dark:disabled:bg-sky-800 text-white py-2 rounded-lg font-semibold transition-colors"
      >
        @if (loading) { Logowanie... } @else { Zaloguj się }
      </button>
    </form>
    <p class="text-sky-500 dark:text-sky-400 text-sm mt-4 text-center">
      Nie masz konta? <a routerLink="/register" class="text-sky-600 dark:text-sky-300 hover:underline font-medium">Zarejestruj się</a>
    </p>
    @if (error) {
      <p class="text-red-500 dark:text-red-400 text-sm mt-3 text-center">{{ error }}</p>
    }
  </div>
</div>
